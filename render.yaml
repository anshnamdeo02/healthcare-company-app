services:
  - type: web
    name: healthcare-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install && npx prisma generate
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AES_ENCRYPTION_KEY
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_RESET_EXPIRES_IN
        value: 15m
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: COMPANY_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: your-cloud-name
      - key: CLOUDINARY_API_KEY
        value: your-api-key
      - key: CLOUDINARY_API_SECRET
        value: your-api-secret
    healthCheckPath: /api/v1/health
